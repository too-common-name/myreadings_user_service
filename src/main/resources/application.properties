# ==========================================================
# === USER-SERVICE CONFIGURATION (STANDALONE)            ===
# ==========================================================

# --- Common Reusable Variables ---
db.host=${POSTGRES_HOSTNAME:localhost}
db.port=${POSTGRES_PORT_CONTAINER:5432}
db.user=${POSTGRES_USER:myreadings-user}
db.password=${POSTGRES_PASSWORD:supersecretpassword}

# Disable DevServices in normal runs
quarkus.devservices.enabled=false

# --- Application Port ---
quarkus.application.name=user-service
quarkus.http.port=8083
app.repository.type=jpa
smallrye.jwt.path.groups=realm_access/roles

# --- OIDC/Keycloak Configuration (dev/prod only; tests use DevServices) ---
%dev.quarkus.oidc.auth-server-url=http://${KEYCLOAK_HOSTNAME:localhost}:${KEYCLOAK_PORT_CONTAINER:8080}/realms/${KEYCLOAK_REALM:my-readings}
%dev.quarkus.oidc.token.issuer=http://localhost:${KEYCLOAK_PORT_HOST:8080}/realms/${KEYCLOAK_REALM:my-readings}
%prod.quarkus.oidc.auth-server-url=http://${KEYCLOAK_HOSTNAME:localhost}:${KEYCLOAK_PORT_CONTAINER:8080}/realms/${KEYCLOAK_REALM:my-readings}
%prod.quarkus.oidc.token.issuer=http://localhost:${KEYCLOAK_PORT_HOST:8080}/realms/${KEYCLOAK_REALM:my-readings}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:myreadings-client}
quarkus.oidc.credentials.secret=${KC_ADMIN_PASSWORD:admin}
quarkus.oidc.tls.verification=none

# --- RabbitMQ Messaging Configuration ---
mp.messaging.connector.smallrye-rabbitmq.host=${RABBITMQ_HOSTNAME:localhost}
mp.messaging.connector.smallrye-rabbitmq.port=${RABBITMQ_PORT_CONTAINER:5672}
mp.messaging.connector.smallrye-rabbitmq.username=${RABBITMQ_APP_USER:myreadings-user}
mp.messaging.connector.smallrye-rabbitmq.password=${RABBITMQ_APP_PASSWORD:myreadings-user}
mp.messaging.connector.smallrye-rabbitmq.virtual-host=${RABBITMQ_VHOST:my-readings}

mp.messaging.incoming.registrations.connector=smallrye-rabbitmq
mp.messaging.incoming.registrations.queue.name=${RABBITMQ_QUEUE_NAME:myreadings-queue}
mp.messaging.incoming.registrations.exchange.name=amq.topic
mp.messaging.incoming.registrations.routing-keys=${RABBITMQ_BINDING_KEY:KK.EVENT.CLIENT.my-readings.SUCCESS.myreadings-client.REGISTER}
mp.messaging.incoming.registrations.broadcast=true

# --- Outgoing: notify monolith when a user profile is created ---
mp.messaging.outgoing.user-profile-created.connector=smallrye-rabbitmq
mp.messaging.outgoing.user-profile-created.exchange.name=user-events
mp.messaging.outgoing.user-profile-created.exchange.type=fanout
mp.messaging.outgoing.user-profile-created.exchange.declare=true
mp.messaging.outgoing.user-profile-created.default-routing-key=user.created

# --- Users DB Datasource ---
quarkus.datasource."users-db".db-kind=postgresql
quarkus.datasource."users-db".username=${db.user}
quarkus.datasource."users-db".password=${db.password}
quarkus.hibernate-orm."users-db".packages=org.modular.playground.user.infrastructure.persistence.postgres
quarkus.hibernate-orm."users-db".datasource=users-db

%dev.quarkus.datasource."users-db".jdbc.url=jdbc:postgresql://${db.host}:${db.port}/users_db
%prod.quarkus.datasource."users-db".jdbc.url=jdbc:postgresql://${db.host}:${db.port}/users_db

# --- Logging ---
quarkus.log.level=INFO
quarkus.log.category."org.hibernate".level=WARN
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=true

# =======================================================================
# === PROFILE-SPECIFIC OVERRIDES                                      ===
# =======================================================================

%dev.quarkus.devservices.enabled=false
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=/.*/
%dev.quarkus.log.console.json=false
%dev.quarkus.log.console.json.pretty-print=false

# =======================================================================
# === TEST PROFILE (DevServices enabled for Keycloak, Postgres, etc.)  ===
# =======================================================================

# --- Test profile: all test config is in src/test/resources/application.properties ---